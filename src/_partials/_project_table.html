<link rel="stylesheet" href="../assets/css/project-table.css">

<table class="project-table">
  <thead>
    <tr>
      <td>Year</td>
      <td>Project</td>
      <td>Type</td>
      <td>Description</td>
    </tr>
  </thead>
  <tbody>
    {{#collection.projects}}
      <tr class="{{#data.draft}}disabled{{/data.draft}}">
        <td title="Age [{{date}}]">
          {{#fn.dateToYear}}{{date}}{{/fn.dateToYear}}
        </td>
        <td class="link">
          <a {{^data.draft}} href="{{site.url}}{{path}}" {{/data.draft}} class="{{#data.draft}}disabled{{/data.draft}}">
            {{title}}
          </a>
        </td>
        <td>
          {{data.type}}
        </td>
        <td>
          {{data.description}}
        </td>
      </tr>
    {{/collection.projects}}

    <tr class="disabled">
      <td title="Age [1992]">
        1992
      </td>
      <td class="link">
        <a class="disabled">
          Born
        </a>
      </td>
      <td>
        birth
      </td>
      <td>
        I was have been born
      </td>
    </tr>
  </tbody>
</table>

<script sb:buildtime>
  const BIRTH_YEAR = 1992

  const cells = document.querySelectorAll("td[title]")

  for (const cell of cells) {
    const title = cell.getAttribute("title")
    if (!title) continue

    const titleSplit = title.split("[")
    if (titleSplit.length === 0) continue

    const [firstPart, dateString] = titleSplit
    const date = new Date(dateString.replace("]", ""))
    const age = date.getFullYear() - BIRTH_YEAR

    cell.setAttribute("title", `${firstPart} ${age}`)
  }
</script>
